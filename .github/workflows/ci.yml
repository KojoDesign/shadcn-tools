name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build

      - name: Smoke-test built CLI
        run: |
          node dist/bin/build-registry.js test/fixtures/basic/registry.ts
          test -f test/fixtures/basic/registry.json
          rm test/fixtures/basic/registry.json

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore
          retention-days: 7
